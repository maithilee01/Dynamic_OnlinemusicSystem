<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="BeatBox Online Sign-Up" />
    <meta name="keywords" content="BeatBox, signup, creative" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>BeatBox Online</title>
    <link rel="stylesheet" href="signup.css"> <!-- Connect the same CSS file -->
  </head>
  <body>
    <div class="wrapper">
      <div class="login-text">
        <div class="text">
          <a href="">Sign Up</a>
          <hr>
          <br>
          <input type="text" placeholder="Username" />
          <br />
          <input type="email" placeholder="Email" />
          <br />
          <input type="password" placeholder="Password" />
          <br />
          <input type="password" placeholder="Confirm Password" />
          <br />
          <button class="signup-btn">Sign Up</button>
          <button class="login-btn" onclick="window.location.href='login.html'">Log In</button>
        </div>
      </div>
    
    </div>
    <script src="signup.js"></script>
  </body>
</html>
